name: Update Feeds

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-feeds
  cancel-in-progress: true

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      SKIP_RSS: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r feed/requirements.txt

      - name: Update NVD data
        run: python feed/update_nvd_data.py

      - name: Generate vulnerability feeds
        run: python feed/Vul_Feed_Gen.py

      - name: Update timestamp
        run: |
          date -u > last_updated.txt
          cat last_updated.txt

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kev_enriched.json combined_enriched.json last_updated.txt
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Update vulnerability feeds $(date -u)"
            git push
          fi
